<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#be123c" />
    <title>Dang ngoai tuyen - WC 2026</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #070a13;
        color: #f8fafc;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        margin: 0 auto;
        max-width: 520px;
      }

      h1 {
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
        margin: 0 0 16px;
      }

      p {
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.6;
        margin: 0 0 24px;
      }

      a {
        background: #be123c;
        border-radius: 999px;
        color: #ffffff;
        display: inline-flex;
        font-weight: 700;
        padding: 12px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ban dang ngoai tuyen</h1>
      <p>
        Lich da luu se hien thi lai khi ban quay ve trang chinh. Hay kiem tra ket noi mang roi thu lai.
      </p>
      <a href="/">Mo lai ung dung</a>
    </main>
  </body>
</html>
